name: Sync version from release tag

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"

# release.published and push.tags often fire together for the same tag; without
# serialization both jobs can commit from the same base and the second push loses.
concurrency:
  group: sync-version-from-tag-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync-version:
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve release tag
        id: tag
        run: |
          TAG="${{ github.event.release.tag_name || github.ref_name }}"
          if [ -z "$TAG" ]; then
            echo "No release tag found in event payload."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Sync versions
        run: python3 scripts/sync_version_from_tag.py --tag "${{ steps.tag.outputs.tag }}"

      - name: Commit and push when changed
        env:
          BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if git diff --quiet; then
            echo "No version changes to commit."
            exit 0
          fi
          VERSION="$(python3 scripts/sync_version_from_tag.py --tag "${{ steps.tag.outputs.tag }}" --print-only)"
          git add frontend/package.json backend/pyproject.toml backend/app/main.py
          GIT_AUTHOR_NAME="github-actions[bot]" \
          GIT_AUTHOR_EMAIL="41898282+github-actions[bot]@users.noreply.github.com" \
          GIT_COMMITTER_NAME="github-actions[bot]" \
          GIT_COMMITTER_EMAIL="41898282+github-actions[bot]@users.noreply.github.com" \
          git commit -m "chore(version): sync to ${VERSION} from GitHub release tag"
          git fetch origin "$BRANCH"
          git rebase "origin/${BRANCH}"
          git push origin "$BRANCH"
