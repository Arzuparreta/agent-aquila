name: agent-aquila

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    # Host 5433 avoids clashing with a local PostgreSQL on 5432. Inside the stack, use db:5432.
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    # Linux: host.docker.internal is not defined by default (unlike Docker Desktop). Map it to the
    # host gateway so URLs like http://host.docker.internal:11434 reach Ollama on the host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Clear host-only DATABASE_URL from .env; the app builds the asyncpg URL from POSTGRES_* with
    # URL-encoded credentials (raw passwords in compose interpolation break URLs and cause 500s on login).
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DATABASE_URL: ""
      REDIS_URL: redis://redis:6379/0
      AQUILA_USER_DATA_DIR: /app/.local_data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Migrations: if backend exits here, check logs for Alembic errors (e.g. alembic_version
    # VARCHAR(32) vs long revision ids — mitigated in backend/alembic/env.py).
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount the backend dir for live-reload AND so backend/.secrets/fernet.key
      # (the auto-generated KEK) survives `docker compose down -v` rebuilds. If you
      # ever switch this to an image-only deployment, replace this with a dedicated
      # named volume mounted at /app/.secrets and keep that volume out of CI cleanups.
      - ./backend:/app

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DATABASE_URL: ""
      REDIS_URL: redis://redis:6379/0
      AQUILA_USER_DATA_DIR: /app/.local_data
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Wait for migrations before starting the worker loop.
    command: sh -c "sleep 5 && arq app.worker.WorkerSettings"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    environment:
      # Browser calls /api/v1 on the Next server; Next proxies to the API (avoids CORS / localhost vs 127.0.0.1).
      NEXT_PUBLIC_API_URL: /api/v1
      # WebSocket agent events (browser connects to host :8000, not the Next container).
      NEXT_PUBLIC_WS_URL: ws://127.0.0.1:8000
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on:
      - backend
    # 3002 avoids clashing with other apps commonly bound to host :3000.
    ports:
      - "3002:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  # Ephemeral HTTPS URL for OAuth redirects when you have no public domain (Tailscale/LAN only).
  # Google/Microsoft require a browser-reachable HTTPS callback; this is not a "server monitor".
  # Run: docker compose --profile oauth-tunnel up -d
  # Then: docker compose logs cloudflared  (copy the trycloudflare.com origin into Settings → Public URL + provider consoles).
  # For a stable hostname, use a Cloudflare named tunnel or your own domain instead.
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles:
      - oauth-tunnel
    command: tunnel --no-autoupdate --url http://frontend:3000
    depends_on:
      - frontend
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
  frontend_node_modules:
